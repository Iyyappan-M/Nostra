<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Membership | Nostra Subscribe</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body style="background: #111; overflow-x: hidden;">
    <nav class="navbar" id="navbar">
        <h1 style="color: white;">NOSTRA</h1>
        <div class="navbar-links">
            <a href="index.html" class="navbar-link" style="color: rgba(255,255,255,0.8);">Home</a>
            <a href="collection.html" class="navbar-link" style="color: rgba(255,255,255,0.8);">Collection</a>
            <a href="contact.html" class="navbar-link" style="color: rgba(255,255,255,0.8);">Contact</a>
        </div>
        <div class="navbar-icons" style="color: white;">
            <a href="login.html" id="login-link" style="color: inherit;"><i class="fa-solid fa-user"></i></a>

            <div class="profile-container" id="profile-container" style="display: none;">
                <div class="profile-icon" id="profile-icon"></div>
                <div class="dropdown-menu" id="dropdown-menu">
                    <span class="dropdown-item" id="user-email-display"
                        style="font-weight: 600; border-bottom: 1px solid #eee;"></span>
                    <a href="checkout.html" class="dropdown-item"><i class="fa-solid fa-cart-shopping"></i> My Cart</a>
                    <a href="#" class="dropdown-item" id="logout-btn"><i class="fa-solid fa-right-from-bracket"></i>
                        Logout</a>
                </div>
            </div>
        </div>
    </nav>

    <main
        style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at top right, #3A1C71, #D76D77, #FFAF7B); position: relative; padding: 2rem;">
        <!-- Animated Background Shapes -->
        <div
            style="position: absolute; width: 400px; height: 400px; background: rgba(255, 77, 109, 0.3); border-radius: 50%; filter: blur(80px); top: 10%; left: -5%; z-index: 0; animation: float 10s infinite alternate;">
        </div>
        <div
            style="position: absolute; width: 300px; height: 300px; background: rgba(108, 99, 255, 0.3); border-radius: 50%; filter: blur(60px); bottom: 10%; right: 0; z-index: 0; animation: float 8s infinite alternate-reverse;">
        </div>

        <div
            style="background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 40px; padding: 4rem; width: 100%; max-width: 600px; text-align: center; color: white; position: relative; z-index: 1; box-shadow: 0 40px 100px rgba(0,0,0,0.3);">
            <div style="margin-bottom: 2rem;">
                <span
                    style="background: var(--gradient-primary); padding: 0.5rem 1.5rem; border-radius: 50px; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 2px;">Vip
                    Access</span>
            </div>
            <h2 style="font-size: 3rem; font-weight: 800; margin-bottom: 1rem; line-height: 1.1;">Stay Ahead of <span
                    style="background: var(--gradient-primary); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">the
                    Curve</span></h2>
            <p style="font-size: 1.1rem; color: rgba(255,255,255,0.8); margin-bottom: 3rem;">Subscribe to unlock deep
                insights into the fashion world, early drop alerts, and exclusive member-only pricing.</p>

            <form onsubmit="event.preventDefault(); alert('Influence Synced! Welcome to Nostra Club.');"
                style="display: flex; flex-direction: column; gap: 1rem;">
                <input type="email" placeholder="Enter your email to influence..." required
                    style="padding: 1.5rem 2rem; border-radius: 50px; border: none; background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); outline: none; font-size: 1rem; transition: 0.4s;"
                    onfocus="this.style.background='rgba(255,255,255,0.2)'; this.style.borderColor='white'">

                <button type="submit" class="btn-gradient"
                    style="padding: 1.5rem; border-radius: 50px; font-size: 1.1rem; border: none; font-weight: 700; cursor: pointer; transform: translateY(0); transition: 0.3s; box-shadow: 0 15px 30px rgba(255, 77, 109, 0.4);">Join
                    the Future</button>
            </form>

            <div
                style="margin-top: 3rem; display: flex; justify-content: center; gap: 30px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 2rem; font-size: 0.9rem;">
                <div><i class="fa-solid fa-plane-up" style="color: var(--primary-color);"></i> Global Drops</div>
                <div><i class="fa-solid fa-crown" style="color: var(--secondary-color);"></i> Priority Support</div>
            </div>
        </div>
    </main>

    <style>
        @keyframes float {
            0% {
                transform: translateY(0px) rotate(0deg);
            }

            100% {
                transform: translateY(-30px) rotate(5deg);
            }
        }
    </style>

    <!-- Custom JS -->
    <script src="js/main.js"></script>
    <script>
        // Adjust navbar for this specific dark page
        document.addEventListener('DOMContentLoaded', () => {
            const nav = document.getElementById('navbar');
            nav.classList.add('scrolled'); // Force solid look or keep transparent
            nav.style.background = 'transparent';
            nav.style.boxShadow = 'none';
        });
    </script>
</body>

</html>
