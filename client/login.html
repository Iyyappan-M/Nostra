<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest List | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/butterflies.css">
</head>

<body>
    <div class="auth-page">
        <div class="auth-card">
            <h1
                style="text-align: center; margin-bottom: 2rem; background: var(--gradient-primary); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">
                Sign In
            </h1>
            <form id="login-form">
                <div class="form-group">
                    <input type="email" name="email" placeholder="Email Address" required>
                </div>
                <div class="form-group">
                    <input type="password" name="password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn-gradient" style="width: 100%;">Enter Nostra</button>
            </form>
            <p style="margin-top: 1.5rem; text-align: center; font-size: 0.9rem;">
                New to the club? <a href="signup.html" style="color: var(--primary-color); font-weight: 600;">Apply for
                    Membership</a>
            </p>
            <div style="text-align: center; margin-top: 1rem;">
                <a href="admin-login.html" style="font-size: 0.8rem; color: #888;">Staff Login</a> |
                <a href="index.html" style="font-size: 0.8rem; color: #888;">Back to Home</a>
            </div>
        </div>
    </div>
    <script src="js/main.js"></script>
    <script src="js/butterflies.js"></script>
</body>

</html>
