<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Your Profile | Nostra</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/butterflies.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #ede9fe 0%, #f3e8ff 50%, #e0e7ff 100%);
            overflow-x: hidden;
            font-family: 'Poppins', sans-serif;
            position: relative;
        }

        .profile-container {
            background: rgba(255, 255, 255, 0.85);
            padding: 60px 80px;
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            width: 95%;
            max-width: 1200px;
            text-align: center;
            border: 1px solid #ddd6fe;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            animation: slideUpFade 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            z-index: 10;
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 60px;
            align-items: center;
        }

        .profile-left {
            text-align: center;
            padding-right: 40px;
            border-right: 1px solid #ddd6fe;
        }

        .profile-right {
            text-align: left;
        }

        @keyframes slideUpFade {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.98);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Profile Avatar Glow */
        .avatar-container {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px auto;
            border-radius: 50%;
            background: #7c3aed;
            border: 2px solid #ddd6fe;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #ffffff;
            font-weight: 500;
            box-shadow: 0 10px 20px rgba(124, 58, 237, 0.25);
            animation: softPulse 3s infinite alternate;
        }

        @keyframes softPulse {
            from {
                box-shadow: 0 0 10px rgba(124, 58, 237, 0.2);
            }

            to {
                box-shadow: 0 0 25px rgba(124, 58, 237, 0.5);
            }
        }

        .profile-container h2 {
            margin-bottom: 5px;
            color: #5b21b6;
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .profile-container p.subtitle {
            color: #7c3aed;
            margin-bottom: 40px;
            font-size: 0.95rem;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        .form-group {
            margin-bottom: 30px;
            text-align: left;
            position: relative;
        }

        .form-group label.group-title {
            display: block;
            margin-bottom: 12px;
            font-weight: 500;
            color: #6d28d9;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        /* Readonly input style */
        .premium-input {
            width: 100%;
            padding: 16px 20px;
            background: #ffffff;
            border: 1px solid #d8b4fe;
            border-radius: 16px;
            color: #4c1d95;
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .premium-input:disabled {
            color: #8b5cf6;
            cursor: not-allowed;
            background: #f5f3ff;
            border-color: #ede9fe;
        }

        /* Modern Select Details */
        select.modern-select {
            width: 100%;
            padding: 16px 20px;
            border: 1px solid #d8b4fe;
            border-radius: 16px;
            font-family: inherit;
            font-size: 0.95rem;
            color: #4c1d95;
            background: #ffffff url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="%238b5cf6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>') no-repeat right 15px center;
            appearance: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        select.modern-select option {
            background-color: #ffffff;
            color: #4c1d95;
        }

        select.modern-select:focus,
        .premium-input:focus {
            border-color: #8b5cf6;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(221, 214, 254, 0.5);
            outline: none;
        }

        /* Radio Buttons / Toggle Buttons */
        .toggle-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .toggle-option {
            flex: 1;
            position: relative;
        }

        .toggle-option input[type="radio"] {
            display: none;
        }

        .toggle-option label {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px 10px;
            background: #f5f3ff;
            border: 1px solid #ede9fe;
            border-radius: 14px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #6d28d9;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .toggle-option label:hover {
            background: #ede9fe;
        }

        .toggle-option input[type="radio"]:checked+label {
            background: #7c3aed;
            border-color: transparent;
            color: #ffffff;
            box-shadow: 0 4px 10px rgba(124, 58, 237, 0.3);
        }

        .toggle-option label i {
            margin-right: 8px;
            color: inherit;
        }

        /* Submit Button */
        .btn-submit {
            width: 100%;
            padding: 18px;
            margin-top: 20px;
            background: linear-gradient(to right, #7c3aed, #9333ea);
            color: #ffffff;
            border: none;
            border-radius: 16px;
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3);
        }

        .btn-submit:hover {
            transform: scale(1.05) translateY(-2px);
            background: linear-gradient(to right, #6d28d9, #7e22ce);
            box-shadow: 0 10px 25px rgba(124, 58, 237, 0.5);
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        /* Loading Spinner */
        .loader {
            display: none;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid #ffffff;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            top: 40px;
            right: 40px;
            padding: 16px 24px;
            background: #ffffff;
            border-left: 4px solid #6366f1;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: 500;
            color: #111827;
            transform: translateX(150%);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 1000;
        }

        .toast.success {
            border-left-color: #10b981;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast i.success-icon {
            color: #10b981;
            font-size: 1.2rem;
        }

        .toast i.error-icon {
            color: #ef4444;
            font-size: 1.2rem;
        }

        /* Tablet & Mobile Adjustments */
        @media (max-width: 1024px) {
            .profile-container {
                grid-template-columns: 1fr;
                gap: 40px;
                padding: 50px 40px;
                width: 90%;
            }

            .profile-left {
                border-right: none;
                border-bottom: 1px solid #ddd6fe;
                padding-right: 0;
                padding-bottom: 40px;
            }
        }

        @media (max-width: 600px) {
            .profile-container {
                padding: 40px 25px;
                border-radius: 24px;
                width: 95%;
            }

            .toggle-group {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <!-- Toast Notification -->
    <div id="toast" class="toast">
        <i class="fa-solid fa-circle-check success-icon" id="toast-icon"></i>
        <span id="toast-msg">Profile saved successfully!</span>
    </div>

    <div class="profile-container">
        <div class="profile-left">
            <div class="avatar-container" id="profile-avatar">
                N
            </div>
            <h2>Your Profile</h2>
            <p class="subtitle" style="margin-bottom: 30px;">Complete your fashion preferences</p>

            <div class="form-group">
                <label class="group-title">Account Holder</label>
                <input type="text" id="display-name" class="premium-input" disabled value="Loading...">
            </div>
        </div>

        <div class="profile-right">
            <form id="profile-form">
                <div class="form-group">
                    <label class="group-title">Select Your Gender</label>
                    <div class="toggle-group">
                        <div class="toggle-option">
                            <input type="radio" id="gender-male" name="gender" value="Male" required>
                            <label for="gender-male"><i class="fa-solid fa-mars"></i> Male</label>
                        </div>
                        <div class="toggle-option">
                            <input type="radio" id="gender-female" name="gender" value="Female">
                            <label for="gender-female"><i class="fa-solid fa-venus"></i> Female</label>
                        </div>
                        <div class="toggle-option">
                            <input type="radio" id="gender-other" name="gender" value="Other">
                            <label for="gender-other"><i class="fa-solid fa-genderless"></i> Other</label>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="group-title" for="ageCategory">Age Bracket</label>
                    <select id="ageCategory" class="modern-select" required>
                        <option value="" disabled selected>Select Your Age Group</option>
                        <option value="15-20">15–20</option>
                        <option value="21-30">21–30</option>
                        <option value="31-40">31–40</option>
                        <option value="41+">41+</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="group-title">Shopping Preference</label>
                    <div class="toggle-group">
                        <div class="toggle-option">
                            <input type="radio" id="pref-men" name="preference" value="Men Fashion" required>
                            <label for="pref-men">Men Fashion</label>
                        </div>
                        <div class="toggle-option">
                            <input type="radio" id="pref-women" name="preference" value="Women Fashion">
                            <label for="pref-women">Women Fashion</label>
                        </div>
                        <div class="toggle-option">
                            <input type="radio" id="pref-both" name="preference" value="Both">
                            <label for="pref-both">Both</label>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn-submit" id="submit-btn" style="margin-top: 30px;">
                    <span id="btn-text">Experience Nostra <i class="fa-solid fa-arrow-right"
                            style="margin-left: 8px;"></i></span>
                    <div class="loader" id="btn-loader"></div>
                </button>
            </form>
        </div>
    </div>

    <script src="js/butterflies.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('user'));
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            if (user.profileCompleted) {
                window.location.href = 'index.html';
                return;
            }

            // Set Avatar initial, Name, and Email
            const dpAvatar = document.getElementById('profile-avatar');
            const displayName = document.getElementById('display-name');
            if (user.name) {
                dpAvatar.innerText = user.name.charAt(0).toUpperCase();
                displayName.value = user.name + "  |  " + user.email;
            }

            const profileForm = document.getElementById('profile-form');
            const submitBtn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            const btnLoader = document.getElementById('btn-loader');
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toast-msg');
            const toastIcon = document.getElementById('toast-icon');

            function showToast(message, isSuccess = true) {
                toastMsg.textContent = message;
                if (isSuccess) {
                    toast.classList.add('success');
                    toastIcon.className = 'fa-solid fa-circle-check success-icon';
                } else {
                    toast.classList.remove('success');
                    toastIcon.className = 'fa-solid fa-circle-exclamation error-icon';
                }
                toast.classList.add('show');
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 3000);
            }

            profileForm.addEventListener('submit', async (e) => {
                e.preventDefault();

                // Get selected radio values
                const gender = document.querySelector('input[name="gender"]:checked').value;
                const preference = document.querySelector('input[name="preference"]:checked').value;
                const ageCategory = document.getElementById('ageCategory').value;

                // UI Loading State
                btnText.style.display = 'none';
                btnLoader.style.display = 'block';
                submitBtn.disabled = true;

                try {
                    const res = await fetch('http://localhost:5000/api/auth/profile', {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${user.token}`
                        },
                        body: JSON.stringify({
                            userId: user._id,
                            gender,
                            ageCategory,
                            preference
                        })
                    });

                    const data = await res.json();

                    if (res.ok) {
                        localStorage.setItem('user', JSON.stringify(data));
                        showToast('Profile ready! Entering Nostra...', true);

                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 1500);

                    } else {
                        showToast(data.message || 'Update failed', false);
                        resetButton();
                    }
                } catch (error) {
                    showToast('Server connection interrupted.', false);
                    resetButton();
                }
            });

            function resetButton() {
                btnText.style.display = 'inline';
                btnLoader.style.display = 'none';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
